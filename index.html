<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SnapVee Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="text-center p-10 border border-slate-700 rounded-3xl bg-slate-800 shadow-2xl w-full max-w-md">
        <h1 class="text-4xl font-bold mb-4 text-blue-400">SnapVee Pro</h1>
        <input type="text" id="url" class="w-full p-4 rounded-xl bg-slate-900 mb-4 border border-slate-700 focus:border-blue-500 outline-none" placeholder="ضع الرابط هنا...">
        <button onclick="download()" id="mainBtn" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500 transition-all">تحميل الفيديو</button>
        
        <div id="resultArea" class="mt-6 hidden">
            <p class="text-emerald-400 mb-4">✅ الفيديو جاهز للتحميل!</p>
            <a id="downloadLink" href="#" target="_blank" class="block w-full bg-emerald-600 p-4 rounded-xl font-bold hover:bg-emerald-500 transition-all text-center">اضغط هنا لبدء التنزيل الآن</a>
        </div>
        
        <p id="status" class="mt-4 text-sm text-gray-400"></p>
    </div>

    <script>
        async function download() {
            const urlInput = document.getElementById('url').value;
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            const downloadLink = document.getElementById('downloadLink');

            if(!urlInput) return alert('أدخل الرابط يا بطل');

            status.innerText = "⏳ جاري استخراج الفيديو من السيرفر...";
            resultArea.classList.add('hidden');

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await res.json();

                if(data.url) {
                    status.innerText = "";
                    resultArea.classList.remove('hidden');
                    downloadLink.href = data.url;
                    // محاولة تحميل تلقائي
                    window.open(data.url, '_blank');
                } else {
                    status.innerText = "❌ السيرفر لم يجد فيديو، تأكد من الرابط";
                }
            } catch(e) {
                status.innerText = "❌ فشل الاتصال بالسيرفر، تأكد أن الشاشة السوداء تعمل";
            }
        }
    </script>
</body>
</html>
